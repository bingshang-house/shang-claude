name = "shang-competitor"
main = "src/index.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# Browser Rendering binding（爬 591/樂屋）
browser = { binding = "MYBROWSER" }

# KV：geocode cache（30 天 TTL，避免重複 query Google Maps）
[[kv_namespaces]]
binding = "GEOCACHE"
id = "43dade7042dd4a229deb251ffa4eeabe"

# KV：競品物件快取（GHA cron 每小時抓 591/sinyi/rakuya 寫入；worker /search 讀取）
[[kv_namespaces]]
binding = "COMPETITOR_DATA"
id = "a33b8106323041a4b56d8b7970e6c5cd"

# 環境變數（部署後 wrangler secret put）
# - GOOGLE_MAPS_API_KEY：Google Maps Geocoding API key
# - WHITELIST_WORKER_URL：shang-whitelist worker 的網址（驗證夥伴 email）
[vars]
DEFAULT_REGION = "17"  # 17 = 高雄市
DEFAULT_PAGES = "5"     # 抓前 5 頁
