name: CPI 物價指數同步（每月一次）

on:
  # 每月 1 日，UTC 03:17（台北 11:17）；避開整點以免 GHA 尖峰 skip
  schedule:
    - cron: '17 3 1 * *'
  # 允許手動觸發（給賞哥想立刻更新時用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝 xlrd（要 1.2.0 才支援舊版 .xls）
        run: pip install xlrd==1.2.0

      - name: 抓 dgbas 物價指數對照表 → data/cpi-tax-index.json
        run: python scripts/fetch-cpi.py

      - name: Commit + push（若有變動）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/cpi-tax-index.json
          if git diff --cached --quiet; then
            echo "資料無變動，跳過 commit"
          else
            git commit -m "chore(cpi): 自動更新物價指數對照表（$(date -u +%Y-%m-%d))"
            git push
          fi
