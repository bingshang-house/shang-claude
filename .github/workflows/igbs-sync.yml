name: IGBS 標章資料同步（兩週一次）

on:
  # 每月 1 日與 15 日，UTC 03:17（台北 11:17）；避開整點以免 GHA 尖峰 skip
  schedule:
    - cron: '17 3 1,15 * *'
  # 也允許手動觸發（給賞哥想立刻更新時用）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 抓 igbs-tabc.org 三大標章資料
        run: node scripts/fetch-igbs.js

      - name: Commit + push（若有變動）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/igbs-*.json
          if git diff --cached --quiet; then
            echo "資料無變動，跳過 commit"
          else
            git commit -m "chore(igbs): 自動更新標章資料（$(date -u +%Y-%m-%d))"
            git push
          fi
